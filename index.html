<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificate Generator</title>
  
  <!-- Fonts: Inter for UI and standard text, Dancing Script for cursive Name -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="./style.css" />
  
  <!-- PapaParse for CSV parsing -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
  <div class="app-container">
    <!-- Topbar -->
    <header class="topbar">
      <div class="logo">
        <strong>CertGen</strong>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn theme-toggle" id="theme-toggle" title="Toggle Theme">🌓</button>
        <button class="action-btn primary" id="download-btn">
          <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/><path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/></svg>
          Download
        </button>
      </div>
    </header>

    <div class="main-workspace">
      <!-- Left Sidebar -->
      <aside class="sidebar">
        <!-- Tabs -->
        <div class="sidebar-tabs">
          <button class="tab active" data-target="tab-manual">Manual Entry</button>
          <button class="tab" data-target="tab-csv">Upload CSV</button>
        </div>

        <div class="sidebar-content">
          <!-- Manual Form Tab -->
          <div id="tab-manual" class="tab-pane active">
            <form id="student-form">
              <div class="form-group">
                <label>Student Name</label>
                <input type="text" id="input-name" placeholder="e.g. Nguyễn Văn A" value="Nguyễn Văn A" />
              </div>
              <div class="form-group">
                <label>Course / Program</label>
                <select id="input-course"></select>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Date</label>
                  <input type="date" id="input-date" />
                </div>
                <div class="form-group">
                  <label>Classification</label>
                  <select id="input-rank"></select>
                </div>
              </div>
              <hr class="divider"/>
              
            </form>
          </div>

          <!-- CSV Upload Tab -->
          <div id="tab-csv" class="tab-pane" style="display: none;">
            <div class="upload-box">
              <p>Upload a CSV file containing records.</p>
              <p style="font-size: 11px; margin-bottom: 15px;">Headers must be: <strong>Name, Course, Date, Rank</strong></p>
              <label for="csv-upload" class="upload-btn">Choose CSV File</label>
              <input type="file" id="csv-upload" accept=".csv" style="display: none;" />
              <p class="upload-status" id="upload-status">No file chosen</p>
            </div>
            
            <div class="csv-controls" style="display:none;" id="csv-controls">
              <div class="view-toggles">
                <button class="view-btn active" id="btn-single">Single</button>
                <button class="view-btn" id="btn-grid">Grid</button>
              </div>
              
              <hr class="divider"/>
              
              <div id="single-nav">
                <p style="font-size:14px; text-align:center; margin-bottom:10px;">Previewing record: <span id="record-count">0 / 0</span></p>
                <div class="nav-buttons">
                  <button class="secondary-btn" id="prev-btn">← Prev</button>
                  <button class="secondary-btn" id="next-btn">Next →</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </aside>

      <!-- Right Preview Area -->
      <main class="preview-area" id="preview-area">
        <!-- Single Preview -->
        <div class="preview-wrapper" id="single-view-wrapper">
          <div class="certificate-canvas-container">
            <canvas id="preview-canvas" width="1600" height="1131"></canvas>
          </div>
        </div>
        
        <!-- Grid Preview -->
        <div class="grid-wrapper" id="grid-view-wrapper">
          <!-- Populated by JS -->
        </div>
      </main>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
