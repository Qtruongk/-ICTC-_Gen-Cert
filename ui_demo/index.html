<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificate Generator</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-container">
    <!-- Topbar -->
    <header class="topbar">
      <div class="logo">
        <strong>CertGen</strong>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn theme-toggle" id="theme-toggle" title="Toggle Theme">🌓</button>
        <button class="action-btn">Share</button>
        <button class="action-btn primary" id="download-btn">
          <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/><path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/></svg>
          Download
        </button>
      </div>
    </header>

    <div class="main-workspace">
      <!-- Left Sidebar -->
      <aside class="sidebar">
        <!-- Tabs -->
        <div class="sidebar-tabs">
          <button class="tab active" data-target="tab-manual">Manual Entry</button>
          <button class="tab" data-target="tab-csv">Upload CSV</button>
        </div>

        <div class="sidebar-content">
          <!-- Manual Form Tab -->
          <div id="tab-manual" class="tab-pane active">
            <form id="student-form">
              <div class="form-group">
                <label>Student Name *</label>
                <input type="text" id="input-name" placeholder="e.g. John Doe" value="John Doe" required />
              </div>
              <div class="form-group">
                <label>School Year *</label>
                <input type="text" id="input-year" placeholder="e.g. 2025-2026" value="2025-2026" required />
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Graduation Date *</label>
                  <input type="date" id="input-date" value="2026-06-30" required />
                </div>
                <div class="form-group">
                  <label>Rank *</label>
                  <input type="text" id="input-rank" placeholder="e.g. 1st" value="1st" required />
                </div>
              </div>
              <hr class="divider"/>
              <button type="button" class="add-btn" onclick="drawMockup()">↻ Refresh Preview</button>
            </form>
          </div>

          <!-- CSV Upload Tab -->
          <div id="tab-csv" class="tab-pane" style="display: none;">
            <div class="upload-box">
              <p>Upload a CSV file containing student records.</p>
              <label for="csv-upload" class="upload-btn">Choose CSV File</label>
              <input type="file" id="csv-upload" accept=".csv" style="display: none;" />
              <p class="upload-status" id="upload-status">No file chosen</p>
            </div>
            
            <div class="csv-controls" style="display:none;" id="csv-controls">
              <div class="view-toggles">
                <button class="view-btn active" id="btn-single">Single</button>
                <button class="view-btn" id="btn-grid">Grid</button>
              </div>
              
              <hr class="divider"/>
              
              <div id="single-nav">
                <p style="font-size:14px; text-align:center; margin-bottom:10px;">Previewing record: <span id="record-count">1 / 5</span></p>
                <div class="nav-buttons">
                  <button class="secondary-btn" id="prev-btn">← Prev</button>
                  <button class="secondary-btn" id="next-btn">Next →</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </aside>

      <!-- Right Preview Area -->
      <main class="preview-area" id="preview-area">
        <!-- Single Preview -->
        <div class="preview-wrapper" id="single-view-wrapper">
          <div class="certificate-canvas-container">
            <canvas id="preview-canvas" width="800" height="566"></canvas>
          </div>
        </div>
        
        <!-- Grid Preview -->
        <div class="grid-wrapper" id="grid-view-wrapper">
          <!-- Populated by JS -->
        </div>
      </main>
    </div>
  </div>

  <script>
    // Theme toggle
    const themeBtn = document.getElementById('theme-toggle');
    const setTheme = t => { document.documentElement.dataset.theme = t; localStorage.setItem('theme', t); };
    themeBtn.addEventListener('click', () => {
      const newT = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
      setTheme(newT);
      if(isGridView) renderGrid(); else drawMockup();
    });
    setTheme(localStorage.getItem('theme') || 'light');

    // State
    let isGridView = false;
    let currentIndex = 0;
    let isFileLoaded = false;
    const mockData = [
      { name: "Alice Nguyen", year: "2025-2026", date: "2026-06-30", rank: "1st" },
      { name: "Bob Tran", year: "2025-2026", date: "2026-06-30", rank: "2nd" },
      { name: "Charlie Le", year: "2025-2026", date: "2026-06-30", rank: "3rd" },
      { name: "Diana Pham", year: "2025-2026", date: "2026-06-30", rank: "4th" },
      { name: "Evan Vu", year: "2025-2026", date: "2026-06-30", rank: "5th" }
    ];

    // Tab switching
    const tabs = document.querySelectorAll('.tab');
    const panes = document.querySelectorAll('.tab-pane');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        panes.forEach(p => p.style.display = 'none');
        tab.classList.add('active');
        document.getElementById(tab.dataset.target).style.display = 'block';
        
        // Force single view when returning to Manual
        if (tab.dataset.target === 'tab-manual' && isGridView) {
          switchView('single');
        } else {
          if (isGridView) renderGrid(); else drawMockup();
        }
      });
    });

    // View toggles
    const btnSingle = document.getElementById('btn-single');
    const btnGrid = document.getElementById('btn-grid');
    const singleNav = document.getElementById('single-nav');
    const singleWrapper = document.getElementById('single-view-wrapper');
    const gridWrapper = document.getElementById('grid-view-wrapper');
    const previewArea = document.getElementById('preview-area');

    function switchView(view) {
      if(view === 'grid') {
        isGridView = true;
        btnGrid.classList.add('active');
        btnSingle.classList.remove('active');
        singleNav.style.display = 'none';
        singleWrapper.style.display = 'none';
        gridWrapper.style.display = 'grid';
        previewArea.style.alignItems = 'flex-start';
        renderGrid();
      } else {
        isGridView = false;
        btnSingle.classList.add('active');
        btnGrid.classList.remove('active');
        singleNav.style.display = 'block';
        gridWrapper.style.display = 'none';
        singleWrapper.style.display = 'block';
        previewArea.style.alignItems = 'center';
        drawMockup();
      }
    }

    btnSingle.addEventListener('click', () => switchView('single'));
    btnGrid.addEventListener('click', () => switchView('grid'));

    // File input mock
    document.getElementById('csv-upload').addEventListener('change', (e) => {
      const file = e.target.files[0];
      document.getElementById('upload-status').textContent = file ? file.name : 'No file chosen';
      if(file) {
        document.getElementById('csv-controls').style.display = 'block';
        isFileLoaded = true;
        if(isGridView) renderGrid(); else drawMockup();
      }
    });

    document.getElementById('prev-btn').addEventListener('click', () => {
      if(isFileLoaded && !isGridView) {
        currentIndex = (currentIndex - 1 + mockData.length) % mockData.length;
        drawMockup();
      }
    });

    document.getElementById('next-btn').addEventListener('click', () => {
      if(isFileLoaded && !isGridView) {
        currentIndex = (currentIndex + 1) % mockData.length;
        drawMockup();
      }
    });

    document.querySelectorAll('#student-form input').forEach(el => el.addEventListener('input', () => {
      if(!isGridView) drawMockup();
    }));

    // Draw single canvas
    function drawMockup() {
      const canvas = document.getElementById('preview-canvas');
      const ctx = canvas.getContext('2d');
      const isDark = document.documentElement.dataset.theme === 'dark';
      const isManual = document.querySelector('.tab.active').dataset.target === 'tab-manual';
      
      let data = { name: '[Name]', year: '[Year]', date: '[Date]', rank: '[Rank]' };

      if (isManual) {
        data.name = document.getElementById('input-name').value || '[Name]';
        data.year = document.getElementById('input-year').value || '[Year]';
        data.date = document.getElementById('input-date').value || '[Date]';
        data.rank = document.getElementById('input-rank').value || '[Rank]';
      } else if (isFileLoaded) {
        data = mockData[currentIndex];
        document.getElementById('record-count').textContent = `${currentIndex + 1} / ${mockData.length}`;
      }
      
      renderToContext(ctx, canvas.width, canvas.height, data, isDark);
    }

    // Render Grid
    function renderGrid() {
      if (!isFileLoaded) return;
      gridWrapper.innerHTML = ''; // clear
      const isDark = document.documentElement.dataset.theme === 'dark';

      mockData.forEach((data, index) => {
        const item = document.createElement('div');
        item.className = 'grid-item';
        
        const canvas = document.createElement('canvas');
        canvas.width = 800;
        canvas.height = 566;
        const ctx = canvas.getContext('2d');
        renderToContext(ctx, canvas.width, canvas.height, data, isDark);
        
        const info = document.createElement('div');
        info.className = 'grid-item-info';
        info.textContent = `${index + 1}. ${data.name}`;

        item.appendChild(canvas);
        item.appendChild(info);
        gridWrapper.appendChild(item);
      });
    }

    // Shared render function
    function renderToContext(ctx, w, h, data, isDark) {
      ctx.fillStyle = isDark ? '#1a202c' : '#ffffff';
      ctx.fillRect(0, 0, w, h);
      
      ctx.strokeStyle = isDark ? '#4a5568' : '#2d3748';
      ctx.lineWidth = 10;
      ctx.strokeRect(20, 20, w - 40, h - 40);
      
      ctx.fillStyle = isDark ? '#e2e8f0' : '#1a202c';
      ctx.font = 'bold 36px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('CERTIFICATE OF COMPLETION', w/2, 120);
      
      ctx.font = '20px Inter, sans-serif';
      ctx.fillStyle = isDark ? '#a0aec0' : '#4a5568';
      ctx.fillText('This is proudly presented to', w/2, 170);
      
      ctx.font = 'bold 48px Inter, sans-serif';
      ctx.fillStyle = isDark ? '#f6ad55' : '#dd6b20'; 
      ctx.fillText(data.name, w/2, 250);
      
      ctx.font = '18px Inter, sans-serif';
      ctx.fillStyle = isDark ? '#e2e8f0' : '#2d3748';
      ctx.fillText(`School Year: ${data.year}`, w/2, 330);
      ctx.fillText(`Graduation Date: ${data.date}`, w/2, 370);
      ctx.fillText(`Rank: ${data.rank}`, w/2, 410);
      
      ctx.beginPath();
      ctx.moveTo(150, 480);
      ctx.lineTo(350, 480);
      ctx.moveTo(450, 480);
      ctx.lineTo(650, 480);
      ctx.strokeStyle = isDark ? '#a0aec0' : '#4a5568';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
    
    document.fonts.ready.then(drawMockup);
    drawMockup();
  </script>
</body>
</html>
